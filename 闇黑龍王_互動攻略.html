<meta charset="utf-8">
<title>闇黑龍王 互動攻略 — 檢視</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Microsoft JhengHei","PingFang TC",sans-serif;
    background:linear-gradient(180deg,#081320,#0e2138); color:#e6f1ff; min-height:100vh; padding:16px; }
  h1 { text-align:center; color:#7dd3fc; font-size:23px; }
  .sub { text-align:center; color:#94a3b8; font-size:13px; margin:3px 0 12px; }
  .wrap { max-width:1180px; margin:0 auto; }
  .main{ display:flex; gap:14px; align-items:stretch; }
  .arena-col{ flex:1 1 auto; min-width:0; }
  @media(max-width:780px){ .main{ flex-direction:column; } }
  .rule { background:#3b1418; border:1px solid #fca5a5; color:#fecaca; border-radius:10px;
    padding:9px 14px; font-size:13.5px; text-align:center; margin-bottom:12px; font-weight:700; }
  .arena { position:relative; width:100%; aspect-ratio:1661/1077; border-radius:14px;
    overflow:hidden; border:2px solid #1e3a5f; box-shadow:inset 0 0 50px #000a;
    background-image:url("default.jpg"); background-size:cover; background-position:center; }
  .mark { position:absolute; transform:translate(-50%,-50%); aspect-ratio:1; z-index:5; pointer-events:none; }
  .mark.O { border:4px solid #fde047; border-radius:50%; background:transparent;
    box-shadow:0 0 18px 3px #fde04788, inset 0 0 12px #fde04766; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.65} 50%{opacity:1} }
  .mark.X svg { width:100%; height:100%; display:block; filter:drop-shadow(0 2px 2px #000); }
  .zone { position:absolute; transform:translate(-50%,-50%); border-radius:10px; z-index:3;
    display:flex; align-items:flex-start; justify-content:center; padding-top:3px;
    font-size:11px; font-weight:800; pointer-events:none; }
  .zone.green { background:#22c55e2e; border:2px dashed #22c55e; color:#bbf7d0; }
  .zone.red   { background:#ef44442e; border:2px dashed #ef4444; color:#fecaca; }
  .zone.smoke { background:#12141bb0; border:2px dashed #475569; color:#f8fafc; z-index:4; }
  .zone span{ color:#fff; font-weight:800; text-shadow:0 1px 2px #000,0 0 3px #000; background:rgba(0,0,0,.34); padding:1px 6px; border-radius:5px; }
  .atext{ position:absolute; transform:translate(-50%,-50%); color:#fff; font-weight:800; text-shadow:0 1px 2px #000,0 0 5px #000; white-space:nowrap; z-index:7; pointer-events:none; text-align:center; }
  .atext.editable{ pointer-events:auto; cursor:grab; }
  .atext.sel{ outline:2px dashed #fff; outline-offset:3px; border-radius:4px; }
  .rsz{ position:absolute; right:-8px; bottom:-8px; width:15px; height:15px; background:#fff; border:2px solid #38bdf8; border-radius:3px; cursor:nwse-resize; z-index:20; pointer-events:auto; box-shadow:0 1px 3px #000a; }
  .role { position:absolute; transform:translate(-50%,-50%); z-index:8; text-align:center;
    transition:left .9s cubic-bezier(.5,.05,.3,1), top .9s cubic-bezier(.5,.05,.3,1), opacity .4s; }
  .role img { width:38px; height:38px; border-radius:8px; display:block; border:2px solid #fff; box-shadow:0 2px 7px #000b; }
  .role .nm { font-size:10px; font-weight:800; color:#fff; margin-top:1px; text-shadow:0 1px 2px #000,0 0 4px #000; }
  @media(max-width:640px){ .role img{width:30px;height:30px} .role .nm{font-size:9px} }
  .ctrl { display:flex; gap:8px; justify-content:center; margin:12px 0 6px; flex-wrap:wrap; }
  button { background:#13314f; color:#cfe8ff; border:1px solid #335f8c; border-radius:9px;
    padding:8px 14px; font-size:13.5px; font-weight:700; cursor:pointer; }
  button:hover{ background:#1c456c; }
  button.primary{ background:#38bdf8; border-color:#38bdf8; color:#04263b; }
  #editBtn{ margin-left:10px; border-color:#38bdf8; color:#7dd3fc; }
  .steps{ display:flex; gap:7px; justify-content:center; flex-wrap:wrap; }
  .dot{ width:14px; height:14px; border-radius:50%; background:#33597f; cursor:pointer; display:flex;
    align-items:center; justify-content:center; font-size:9px; color:#0a1626; font-weight:900;}
  .dot.on{ background:#38bdf8; box-shadow:0 0 8px #38bdf8; }
  .panel{ background:#10243b; border:1px solid #1f3b5c; border-radius:12px; padding:14px 16px; flex:0 0 300px; overflow:auto; }
  @media(max-width:780px){ .panel{ flex:1 1 auto; width:100%; } }
  .ptitle{ font-size:18px; font-weight:800; margin-bottom:8px; }
  .ptitle .tag{ font-size:12px; font-weight:700; padding:2px 9px; border-radius:10px; margin-left:8px; }
  .panel ul{ list-style:none; }
  .panel li{ font-size:14px; line-height:1.7; padding-left:18px; position:relative; color:#dbeafe; }
  .panel li::before{ content:"›"; position:absolute; left:2px; color:#38bdf8; font-weight:900; }
  .panel li.warn::before{ content:"!"; color:#fca5a5; }
  .panel li.safe::before{ content:"✓"; color:#86efac; }
  .legend{ text-align:center; font-size:12px; color:#9fb6cf; margin-top:10px; }
  .legend b{ color:#fecaca; } .legend i{ color:#bbf7d0; font-style:normal; }
  .kbd-hint{ text-align:center; font-size:11px; color:#5b748f; margin-top:6px; }
  .kbd-hint kbd{ background:#13314f; border:1px solid #335f8c; border-radius:5px; padding:1px 6px; color:#cfe8ff; font-size:11px; }
  #toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(12px);
    background:#13314fee; color:#cfe8ff; border:1px solid #335f8c; border-radius:10px;
    padding:9px 18px; font-size:13.5px; font-weight:700; z-index:50; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  body.edit .role{ pointer-events:auto; cursor:grab; transition:none; }
  body.edit .role:active{ cursor:grabbing; }
  .mark.editable,.zone.editable{ pointer-events:auto; cursor:grab; }
  .mark.sel{ outline:3px dashed #fff; outline-offset:3px; }
  .zone.sel{ outline:3px solid #fff; }
  #editor{ display:none; }
  body.edit #editor{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:12px 0;
    padding:12px; background:#0c1f33; border:1px solid #1e3a5f; border-radius:12px; }
  .grp{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; background:#10243b; padding:7px 9px; border-radius:9px; }
  .chip{ font-size:12px; padding:3px 9px; border-radius:14px; border:1px solid #335f8c; background:#13314f; color:#9fb6cf; cursor:pointer; }
  .chip.on{ background:#38bdf8; color:#04263b; border-color:#38bdf8; }
  .chip .rm{ margin-left:5px; color:#fca5a5; cursor:pointer; font-weight:900; }
  .role.sel{ outline:3px solid #fff; outline-offset:2px; border-radius:9px; }
  .role .lbl{ font-size:9px; font-weight:800; color:#fde047; text-shadow:0 1px 2px #000,0 0 4px #000; line-height:1.1; }
  @media(max-width:640px){ .role .lbl{ font-size:8px; } }
  .mark .onum{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:#fde047; font-weight:900; font-size:13px; text-shadow:0 1px 3px #000,0 0 4px #000; pointer-events:none; }
  .ed-warn{ width:100%; text-align:center; color:#fca5a5; font-size:12.5px; font-weight:800; }
  .mini{ font-size:12px; padding:4px 9px; }
  .note-row{ display:flex; gap:6px; margin:3px 0; align-items:center; width:100%; }
  .note-row input[type=text]{ flex:1; min-width:160px; }
  .grp select,.grp input[type=text]{ background:#0a1626; border:1px solid #335f8c; color:#e6f1ff; border-radius:6px; padding:5px 7px; font-size:13px; }
  .grp input[type=color]{ width:34px; height:30px; padding:0; border:1px solid #335f8c; border-radius:6px; background:#0a1626; cursor:pointer; }
</style>
<div class="wrap">
  <h1>闇黑龍王 互動攻略</h1>
  <div class="sub">按「下一階段」看各職移動 ・ 〇＝目標　✕＝已斷</div>
  <div class="rule">⚠ 鐵則：尾巴一定要「最先」斷！其他部位先斷 = 挑戰失敗</div>
  <div class="main">
    <div class="arena-col">
      <div class="arena" id="arena"></div>
      <div class="legend"><b>紅框＝危險區（固定）</b>　｜　<i>綠框＝安全區（固定）</i>　｜　灰框＝下煙區</div>
    </div>
    <div class="panel"><div class="ptitle" id="ptitle"></div><ul id="plist"></ul></div>
  </div>
  <div class="ctrl">
    <button id="prev">◀ 上一階段</button>
    <button id="next">下一階段 ▶</button>
    <button id="editBtn">✏ 編輯模式</button>
  </div>
  <div class="steps" id="steps"></div>
  <div class="kbd-hint">鍵盤：<kbd>←</kbd> <kbd>→</kbd> 切換階段　・　編輯時 <kbd>方向鍵</kbd> 微調、<kbd>Esc</kbd> 退出</div>
  <div id="editor"></div>
  <input type="file" id="importFile" accept="application/json" style="display:none">
</div>
<div id="toast"></div>
<script>
const ROLES = {
  hero:{f:'職業/英雄.jpg', n:'英雄'}, long:{f:'職業/龍騎.jpg', n:'龍騎'},
  dao :{f:'職業/刀賊.jpg', n:'刀賊'}, biao:{f:'職業/標賊.jpg', n:'標賊'},
  nu  :{f:'職業/弩手.jpg', n:'弩手'}, qiang:{f:'職業/槍神.jpg', n:'槍神'},
  gong:{f:'職業/箭神.jpg', n:'箭神'}, fa:{f:'職業/冰雷.jpg', n:'冰雷'},
  quan:{f:'職業/拳霸.jpg', n:'拳霸'},
  bishop:{f:'職業/主教.jpg', n:'主教'}, fp:{f:'職業/火毒.jpg', n:'火毒'}, pala:{f:'職業/聖騎士.jpg', n:'聖騎士'},
};
const GLOBAL_ZONES = [{"kind": "green", "x": 87.2, "y": 47.4, "w": 9.5, "h": 80, "t": "安全區"}, {"kind": "red", "x": 33.2, "y": 47.9, "w": 7.9, "h": 77.6, "t": "危險區"}, {"kind": "red", "x": 16.7, "y": 47.7, "w": 7.9, "h": 77.6, "t": "危險區"}, {"kind": "red", "x": 70.8, "y": 47.3, "w": 7.9, "h": 77.6, "t": "危險區"}, {"kind": "red", "x": 84.8, "y": 48.5, "w": 7.9, "h": 77.6, "t": "危險區"}];
const STAGES = [{"name": "開場 ・ 就定位", "color": "#64748b", "marks": [{"kind": "O", "x": 68.6, "y": 82.6, "r": 3.3}], "zones": [], "pos": {"hero": [49.4, 84.5], "quan": [6.8, 82.2], "dao": [10.1, 57.8], "biao": [69.5, 25.2], "long": [49.3, 76], "fa": [26.2, 32.5], "gong": [7.3, 38], "nu": [74.8, 52], "qiang": [89.1, 84.5], "hero2": [49.4, 67.6], "fa2": [30.1, 32.5], "long2": [26.2, 84.1]}, "notes": [["", "各職就初始定位，準備開始攻略"], ["warn", "紅框＝危險區、綠框＝安全區（固定鎖定，每階段顯示）"]]}];
let cur=0, playing=false, timer=null, editMode=false, sel=null;
const arena=document.getElementById('arena');
let roleEls={};
let markEls=[], zoneEls=[], textEls=[];
const DEFAULT_BOARD=JSON.parse(JSON.stringify({STAGES,GLOBAL_ZONES}));
function roleId(k,inst){ return k+'#'+inst; }
function toPairs(v){ if(Array.isArray(v)&&v.length&&Array.isArray(v[0])) return v; if(Array.isArray(v)&&typeof v[0]==='number') return [v]; return []; }
function migrate(){ STAGES.forEach(st=>{ const p=st.pos||(st.pos={});
  for(const k in p) p[k]=toPairs(p[k]);
  [['hero','hero2'],['fa','fa2'],['long','long2']].forEach(([base,clone])=>{ if(p[clone]){ p[base]=(p[base]||[]).concat(p[clone]); delete p[clone]; } });
}); }
function clearRoles(){ for(const id in roleEls) roleEls[id].remove(); roleEls={}; }
const Xsvg='<svg viewBox="0 0 10 10"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round"/></svg>';
const stepsEl=document.getElementById('steps');
function rebuildSteps(){ stepsEl.innerHTML=''; STAGES.forEach((s,i)=>{ const d=document.createElement('div'); d.className='dot'; d.textContent=i; d.onclick=()=>go(i); stepsEl.appendChild(d); }); }
rebuildSteps();
function render(i){
  const st=STAGES[i];
  const need={};
  for(const k in st.pos){ if(!ROLES[k]) continue; (st.pos[k]||[]).forEach((xy,inst)=>{ need[roleId(k,inst)]={k,inst,xy}; }); }
  for(const id in roleEls){ if(!need[id]){ const el=roleEls[id]; el.style.opacity=0; el.style.pointerEvents='none'; } }
  for(const id in need){ const o=need[id]; let e=roleEls[id];
    if(!e){ e=document.createElement('div'); e.className='role'; e.dataset.k=o.k; e.dataset.inst=o.inst;
      e.innerHTML='<img src="'+ROLES[o.k].f+'" alt="'+ROLES[o.k].n+'" draggable="false"><div class="nm"></div><div class="lbl"></div>';
      arena.appendChild(e); roleEls[id]=e;
      attachDrag(e,(x,y)=>{ const a=STAGES[cur].pos[o.k]; if(a&&a[o.inst]){ a[o.inst][0]=x; a[o.inst][1]=y; e.style.left=x+'%'; e.style.top=y+'%'; } },save,()=>selectRole(o.k,o.inst)); }
    e.querySelector('.nm').textContent=ROLES[o.k].n;
    const _l=e.querySelector('.lbl'), _t=(o.xy[2]||''); _l.textContent=_t; _l.style.display=_t?'block':'none';
    e.style.left=o.xy[0]+'%'; e.style.top=o.xy[1]+'%'; e.style.opacity=1; e.style.pointerEvents='';
    e.classList.toggle('sel', !!(editMode&&sel&&sel.type==='role'&&sel.key===o.k&&sel.inst===o.inst));
  }
  markEls.forEach(m=>m.remove()); markEls=[];
  (st.marks||[]).forEach((m,idx)=>{ const d=document.createElement('div'); d.className='mark '+m.kind;
    d.style.left=m.x+'%'; d.style.top=m.y+'%'; d.style.width=(m.r*2)+'%';
    if(m.kind==='X') d.innerHTML=Xsvg;
    if(m.label){ const s=document.createElement('span'); s.className='onum'; s.textContent=m.label; s.style.fontSize=((arena.clientWidth||700)*(m.r*2/100)*0.6)+'px'; d.appendChild(s); }
    if(editMode){ d.classList.add('editable'); if(sel&&sel.type==='mark'&&sel.index===idx) d.classList.add('sel');
      attachDrag(d,(x,y)=>{m.x=x;m.y=y;d.style.left=x+'%';d.style.top=y+'%';},save,()=>selectItem('mark',idx)); }
    arena.appendChild(d); markEls.push(d); });
  zoneEls.forEach(z=>z.remove()); zoneEls=[];
  (st.zones||[]).forEach((z,idx)=>{ const d=document.createElement('div'); d.className='zone '+z.kind;
    d.style.left=z.x+'%'; d.style.top=z.y+'%'; d.style.width=z.w+'%'; d.style.height=z.h+'%';
    d.innerHTML='<span>'+(z.t||'')+'</span>';
    if(editMode){ d.classList.add('editable'); if(sel&&sel.type==='zone'&&sel.index===idx) d.classList.add('sel');
      attachDrag(d,(x,y)=>{z.x=x;z.y=y;d.style.left=x+'%';d.style.top=y+'%';},save,()=>selectItem('zone',idx)); }
    arena.appendChild(d); zoneEls.push(d); });
  GLOBAL_ZONES.forEach(z=>{ const d=document.createElement('div'); d.className='zone '+z.kind;
    d.style.left=z.x+'%'; d.style.top=z.y+'%'; d.style.width=z.w+'%'; d.style.height=z.h+'%';
    arena.appendChild(d); zoneEls.push(d); });
  textEls.forEach(t=>t.remove()); textEls=[];
  (st.texts||[]).forEach((tx,idx)=>{ const d=document.createElement('div'); d.className='atext';
    d.style.left=tx.x+'%'; d.style.top=tx.y+'%'; d.style.fontSize=(tx.size||16)+'px'; d.style.color=tx.color||'#ffffff'; d.textContent=tx.t||'';
    if(editMode){ d.classList.add('editable'); if(sel&&sel.type==='text'&&sel.index===idx) d.classList.add('sel');
      attachDrag(d,(x,y)=>{tx.x=x;tx.y=y;d.style.left=x+'%';d.style.top=y+'%';},save,()=>selectItem('text',idx)); }
    arena.appendChild(d); textEls.push(d); });
  mountHandle();
  renderTitle();
  const ul=document.getElementById('plist'); ul.innerHTML='';
  st.notes.forEach(n=>{ const li=document.createElement('li'); if(n[0])li.className=n[0]; li.textContent=n[1]; ul.appendChild(li); });
  [...stepsEl.children].forEach((d,j)=>d.classList.toggle('on',j===i));
}
function renderTitle(){ const st=STAGES[cur];
  document.getElementById('ptitle').innerHTML = st.name + '<span class="tag" style="background:'+st.color+'33;color:'+st.color+'">'+cur+' / '+(STAGES.length-1)+'</span>'; }
let toastTimer=null;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1400); }
function go(i){
  if(i<0){ showToast('已是第一階段'); i=0; }
  else if(i>STAGES.length-1){ showToast('已是最後階段'); i=STAGES.length-1; }
  cur=i; render(cur); if(editMode) renderEditor();
}
document.getElementById('next').onclick=()=>go(cur+1);
document.getElementById('prev').onclick=()=>go(cur-1);
document.addEventListener('keydown',e=>{
  if(e.target&&/^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName)) return;
  if(e.key==='Escape'){ if(sel){ sel=null; refreshSel(); } else if(editMode){ setEdit(false); } return; }
  if(editMode&&sel&&(e.key==='ArrowLeft'||e.key==='ArrowRight'||e.key==='ArrowUp'||e.key==='ArrowDown')){ e.preventDefault(); nudgeSel(e.key, e.shiftKey?2:0.5); return; }
  if(e.key==='ArrowRight'){ e.preventDefault(); go(cur+1); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); go(cur-1); }
});

/* ---------------- 編輯模式 ---------------- */
function attachDrag(el,onMove,onEnd,onSelect){
  el.addEventListener('pointerdown',e=>{
    if(!editMode) return;
    e.preventDefault(); e.stopPropagation();
    if(onSelect) onSelect();
    let moved=false; el.setPointerCapture(e.pointerId);
    const r=arena.getBoundingClientRect();
    const move=ev=>{ moved=true;
      const x=Math.max(0,Math.min(100,+(((ev.clientX-r.left)/r.width)*100).toFixed(1)));
      const y=Math.max(0,Math.min(100,+(((ev.clientY-r.top)/r.height)*100).toFixed(1)));
      onMove(x,y); showToast(x+'% , '+y+'%'); };
    const up=()=>{ el.releasePointerCapture(e.pointerId);
      el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up);
      if(onEnd) onEnd(moved); };
    el.addEventListener('pointermove',move); el.addEventListener('pointerup',up);
  });
}
function addHandle(el, apply){
  const h=document.createElement('div'); h.className='rsz';
  h.addEventListener('pointerdown',e=>{ if(!editMode) return; e.preventDefault(); e.stopPropagation(); h.setPointerCapture(e.pointerId);
    const r=arena.getBoundingClientRect();
    const move=ev=>{ const px=((ev.clientX-r.left)/r.width)*100; const py=((ev.clientY-r.top)/r.height)*100; apply(px,py,r.height,r.width); };
    const up=()=>{ h.releasePointerCapture(e.pointerId); h.removeEventListener('pointermove',move); h.removeEventListener('pointerup',up); save(); };
    h.addEventListener('pointermove',move); h.addEventListener('pointerup',up); });
  el.appendChild(h);
}
function mountHandle(){
  arena.querySelectorAll('.rsz').forEach(h=>h.remove());
  if(!editMode||!sel) return;
  const st=STAGES[cur];
  if(sel.type==='mark'){ const el=markEls[sel.index], m=st.marks&&st.marks[sel.index]; if(el&&m) addHandle(el,(px,py)=>{ m.r=Math.max(1,+Math.max(Math.abs(px-m.x),Math.abs(py-m.y)).toFixed(1)); el.style.width=(m.r*2)+'%'; const num=el.querySelector('.onum'); if(num) num.style.fontSize=((arena.clientWidth||700)*(m.r*2/100)*0.6)+'px'; }); }
  else if(sel.type==='zone'){ const el=zoneEls[sel.index], z=st.zones&&st.zones[sel.index]; if(el&&z) addHandle(el,(px,py)=>{ z.w=Math.max(2,+(2*Math.abs(px-z.x)).toFixed(1)); z.h=Math.max(2,+(2*Math.abs(py-z.y)).toFixed(1)); el.style.width=z.w+'%'; el.style.height=z.h+'%'; }); }
  else if(sel.type==='text'){ const el=textEls[sel.index], tx=st.texts&&st.texts[sel.index]; if(el&&tx) addHandle(el,(px,py,rh)=>{ tx.size=Math.max(8,Math.round(rh*Math.abs(py-tx.y)/100*2)); el.style.fontSize=tx.size+'px'; }); }
}
function selectItem(type,index){ sel={type,index}; refreshSel(); }
function selectRole(key,inst){ sel={type:'role',key,inst}; refreshSel(); }
function refreshSel(){
  markEls.forEach((el,i)=>el.classList.toggle('sel', !!(sel&&sel.type==='mark'&&sel.index===i)));
  zoneEls.forEach((el,i)=>el.classList.toggle('sel', !!(sel&&sel.type==='zone'&&sel.index===i)));
  textEls.forEach((el,i)=>el.classList.toggle('sel', !!(sel&&sel.type==='text'&&sel.index===i)));

function resizeSel(dir){ const st=STAGES[cur];

function toHex(c){ return /^#[0-9a-fA-F]{6}$/.test(c)?c:'#888888'; }

    ebtn('加主旨',()=>{ (st.texts=st.texts||[]).push({x:50,y:10,t:(st.name||'主旨'),size:22}); sel={type:'text',index:st.texts.length-1}; render(cur); renderEditor(); save(); }) );

function exportJSON(){ const data=JSON.stringify({version:1,STAGES,GLOBAL_ZONES},null,2);
  const blob=new Blob([data],{type:'application/json'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='horntail_stages.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); showToast('已匯出 JSON'); }
document.getElementById('importFile').onchange=ev=>{ const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader(); rd.onload=()=>{ try{ const o=JSON.parse(rd.result);
    if(Array.isArray(o.STAGES)){ STAGES.length=0; o.STAGES.forEach(s=>STAGES.push(s)); }
    if(Array.isArray(o.GLOBAL_ZONES)){ GLOBAL_ZONES.length=0; o.GLOBAL_ZONES.forEach(z=>GLOBAL_ZONES.push(z)); }
    migrate(); clearRoles(); rebuildSteps(); cur=Math.max(0,Math.min(cur,STAGES.length-1)); sel=null; render(cur); renderEditor(); showToast('已匯入 JSON');
  }catch(err){ alert('JSON 解析失敗：'+err.message); } };
  rd.readAsText(f); ev.target.value=''; };
let saveTimer=null;
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ try{ localStorage.setItem('horntail_board', JSON.stringify({version:1,STAGES,GLOBAL_ZONES})); }catch(e){} },400); }
function applyBoard(o){ if(Array.isArray(o.STAGES)){ STAGES.length=0; o.STAGES.forEach(s=>STAGES.push(s)); } if(Array.isArray(o.GLOBAL_ZONES)){ GLOBAL_ZONES.length=0; o.GLOBAL_ZONES.forEach(z=>GLOBAL_ZONES.push(z)); } }
function loadSaved(){ try{ const s=localStorage.getItem('horntail_board'); if(s){ const o=JSON.parse(s); if(Array.isArray(o.STAGES)&&o.STAGES.length){ applyBoard(o); return true; } } }catch(e){} return false; }
function b64enc(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64dec(b){ return decodeURIComponent(escape(atob(b))); }
function parseHash(){ const m=(location.hash||'').match(/^#(view|data)=(.+)$/); if(!m) return null; try{ return {mode:m[1], board:JSON.parse(b64dec(m[2]))}; }catch(e){ return null; } }
function shareLink(){ const json=JSON.stringify({version:1,STAGES,GLOBAL_ZONES}); const url=location.origin+location.pathname+'#view='+b64enc(json);
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(()=>showToast('唯讀分享連結已複製'),()=>prompt('複製此唯讀連結：',url)); } else prompt('複製此唯讀連結：',url); }
function clamp01(v){ return Math.max(0,Math.min(100,+(+v).toFixed(1))); }
function nudgeSel(key,step){ if(!sel) return; const st=STAGES[cur]; let p;
  if(sel.type==='role'){ const a=st.pos[sel.key]; p=a&&a[sel.inst]; }
  else if(sel.type==='mark'){ p=st.marks&&st.marks[sel.index]; }
  else if(sel.type==='zone'){ p=st.zones&&st.zones[sel.index]; }
  else if(sel.type==='text'){ p=st.texts&&st.texts[sel.index]; }
  if(!p) return;
  const dx=key==='ArrowLeft'?-step:key==='ArrowRight'?step:0;
  const dy=key==='ArrowUp'?-step:key==='ArrowDown'?step:0;
  if(sel.type==='role'){ p[0]=clamp01(p[0]+dx); p[1]=clamp01(p[1]+dy); }
  else { p.x=clamp01(p.x+dx); p.y=clamp01(p.y+dy); }
  render(cur); save();
}
function overloadCount(st){ const cells={}; for(const k in st.pos){ (st.pos[k]||[]).forEach(p=>{ const c=Math.round(p[0]/8)+','+Math.round(p[1]/8); cells[c]=(cells[c]||0)+1; }); } let n=0; for(const c in cells) if(cells[c]>3) n++; return n; }
function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }
function dupStage(){ const c=deepCopy(STAGES[cur]); c.name=(c.name||'')+' (複製)'; STAGES.splice(cur+1,0,c); cur=cur+1; rebuildSteps(); render(cur); renderEditor(); save(); }

function delStage(){ if(STAGES.length<=1){ showToast('至少保留一個階段'); return; } if(!confirm('刪除目前階段？')) return; STAGES.splice(cur,1); cur=Math.max(0,Math.min(cur,STAGES.length-1)); sel=null; rebuildSteps(); render(cur); renderEditor(); save(); }
function moveStage(d){ const j=cur+d; if(j<0||j>=STAGES.length){ showToast('已到邊界'); return; } const t=STAGES[cur]; STAGES[cur]=STAGES[j]; STAGES[j]=t; cur=j; rebuildSteps(); render(cur); renderEditor(); save(); }
function refStage(){ return { name:'尾前總站位（參考·可改）', color:'#0ea5b7', marks:[], zones:[],
  pos:{ hero:[[22,30,'攻2/尾死前']], long:[[27,33,''],[50,46,'攻3跳打'],[80,36,'攻3']], dao:[[15,55,'攻4']], quan:[[8,80,'誘惑左']], fa:[[42,46,'攻8大法']], gong:[[62,80,'攻擊點']], nu:[[78,55,'神射攻6']], biao:[[88,26,'攻3單體']] },
  notes:[ ['warn','尾巴必須先死，否則挑戰失敗'], ['','左臂比尾脆弱，英雄/神射常先破左臂'], ['warn','同一位置最多3人；遠程每點最好≤1'], ['','誘惑：拳霸站左、單體職站右上各一'], ['','闇影神偷可先放煙霧彈，全隊集火尾巴'], ['warn','冰雷站能看清王手部動作處以利消技；旁有槍神/夜使者小心被秒'] ] }; }

function resetBoard(){ if(!confirm('清除存稿並還原預設範本？')) return; try{ localStorage.removeItem('horntail_board'); }catch(e){} applyBoard(deepCopy(DEFAULT_BOARD)); migrate(); clearRoles(); cur=0; sel=null; rebuildSteps(); render(cur); renderEditor(); showToast('已重設為預設'); }
