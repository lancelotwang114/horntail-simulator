<svg viewBox="0 0 1120 1592" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Microsoft JhengHei','PingFang TC',sans-serif"><rect x="0" y="0" width="1120" height="1592" fill="url(#bg)"/><defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#0a1626"/>
  <stop offset="1" stop-color="#0e2138"/>
</linearGradient>
<linearGradient id="h1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#14b8a6"/></linearGradient>
<linearGradient id="h2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
<linearGradient id="h3" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6d28d9"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
<linearGradient id="h4" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c2410c"/><stop offset="1" stop-color="#f97316"/></linearGradient>
<linearGradient id="h5" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#15803d"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
<filter id="sh" x="-5%" y="-5%" width="110%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/></filter>
</defs><text x="560.0" y="60" font-size="34" font-weight="900" fill="#7dd3fc" text-anchor="middle">闇黑龍王 攻略流程圖</text><text x="560.0" y="88" font-size="15" fill="#94a3b8" text-anchor="middle">隊伍配置 → 各階段流程 → 換位與機制重點</text><rect x="60" y="110" width="1000" height="60" rx="12" fill="#3b1418" stroke="#fca5a5" stroke-width="2"/><text x="560.0" y="147" font-size="20" font-weight="800" fill="#fca5a5" text-anchor="middle">⚠ 鐵則：尾巴一定要「最先」斷！其他部位先斷 = 挑戰失敗　｜　肚子（中央軀體）最後才打</text><rect x="60" y="192" width="1000" height="306" rx="14" fill="#10243b" stroke="#1e3a5f" stroke-width="1.5" filter="url(#sh)"/><path d="M60,206 a14,14 0 0 1 14,-14 h972 a14,14 0 0 1 14,14 v38 h-1000 z" fill="url(#h1)"/><circle cx="90" cy="218.0" r="17" fill="#ffffff" fill-opacity="0.22"/><text x="90" y="225.0" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="118" y="219.0" font-size="23" font-weight="800" fill="#fff">第一階段：斷尾</text><text x="1042" y="219.0" font-size="15" fill="#e6f6ff" fill-opacity="0.92" text-anchor="end">目標：尾巴先斷</text><text x="84" y="278" font-size="17" font-weight="700" fill="#7dd3fc">①</text><text x="112" y="278" font-size="17" fill="#dbeafe">開場各職依站位圖就位</text><text x="84" y="310" font-size="17" font-weight="700" fill="#7dd3fc">②</text><text x="112" y="310" font-size="17" fill="#dbeafe">約 27 分：刀賊到尾巴下方放煙霧（30 秒 × 2 段）</text><text x="84" y="342" font-size="17" font-weight="700" fill="#7dd3fc">③</text><text x="112" y="342" font-size="17" fill="#dbeafe">煙鋪好後 — 除弩手、槍手外，全員集火尾巴</text><text x="84" y="374" font-size="17" font-weight="700" fill="#fde047">④</text><text x="112" y="374" font-size="17" fill="#dbeafe">煙快散：依距離撤離（越遠先走，肚子位置最晚走）</text><text x="84" y="406" font-size="17" font-weight="700" fill="#fde047">⑤</text><text x="112" y="406" font-size="17" fill="#dbeafe">打到 60% 尾未斷 → 弩手留手（光速神弩改「必殺狙擊」）</text><text x="84" y="438" font-size="17" font-weight="700" fill="#fca5a5">⑥</text><text x="112" y="438" font-size="17" fill="#dbeafe">記錄斷尾當下王的血量 %（重要數據）</text><text x="84" y="470" font-size="17" font-weight="700" fill="#86efac">⑦</text><text x="112" y="470" font-size="17" fill="#dbeafe">斷尾後 → 英雄轉到左側、改打手</text><line x1="560.0" y1="504" x2="560.0" y2="528" stroke="#38bdf8" stroke-width="3"/><path d="M552.0,526 L568.0,526 L560.0,538 z" fill="#38bdf8"/><rect x="60" y="544" width="1000" height="114" rx="14" fill="#10243b" stroke="#1e3a5f" stroke-width="1.5" filter="url(#sh)"/><path d="M60,558 a14,14 0 0 1 14,-14 h972 a14,14 0 0 1 14,14 v38 h-1000 z" fill="url(#h2)"/><circle cx="90" cy="570.0" r="17" fill="#ffffff" fill-opacity="0.22"/><text x="90" y="577.0" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="118" y="571.0" font-size="23" font-weight="800" fill="#fff">第二階段：左手</text><text x="1042" y="571.0" font-size="15" fill="#e6f6ff" fill-opacity="0.92" text-anchor="end">目標：左手</text><text x="84" y="630" font-size="17" font-weight="700" fill="#7dd3fc">›</text><text x="112" y="630" font-size="17" fill="#dbeafe">英雄換到左側，集火左手</text><line x1="560.0" y1="664" x2="560.0" y2="688" stroke="#38bdf8" stroke-width="3"/><path d="M552.0,686 L568.0,686 L560.0,698 z" fill="#38bdf8"/><rect x="60" y="704" width="1000" height="242" rx="14" fill="#10243b" stroke="#1e3a5f" stroke-width="1.5" filter="url(#sh)"/><path d="M60,718 a14,14 0 0 1 14,-14 h972 a14,14 0 0 1 14,14 v38 h-1000 z" fill="url(#h3)"/><circle cx="90" cy="730.0" r="17" fill="#ffffff" fill-opacity="0.22"/><text x="90" y="737.0" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="118" y="731.0" font-size="23" font-weight="800" fill="#fff">第三階段：左頭 + 中頭</text><text x="1042" y="731.0" font-size="15" fill="#e6f6ff" fill-opacity="0.92" text-anchor="end">目標：左龍頭 + 中龍頭</text><text x="84" y="790" font-size="17" font-weight="700" fill="#7dd3fc">›</text><text x="112" y="790" font-size="17" fill="#dbeafe">集火左龍頭 + 中龍頭（不打左手、尾巴）</text><text x="84" y="822" font-size="17" font-weight="700" fill="#fca5a5">！</text><text x="112" y="822" font-size="17" fill="#dbeafe">中頭打到 50% → 黑鎖；主 CALL 計算黑鎖次數</text><text x="84" y="854" font-size="17" font-weight="700" fill="#fde047">›</text><text x="112" y="854" font-size="17" fill="#dbeafe">黑鎖時：標賊、弩手往右站一點（保險牌）</text><text x="84" y="886" font-size="17" font-weight="700" fill="#fde047">›</text><text x="112" y="886" font-size="17" fill="#dbeafe">打完左頭 → 注意「等黑鎖之後」才換位</text><text x="84" y="918" font-size="17" font-weight="700" fill="#86efac">↳</text><text x="112" y="918" font-size="17" fill="#dbeafe">刀賊先換到右邊；弩手換到左邊</text><line x1="560.0" y1="952" x2="560.0" y2="976" stroke="#38bdf8" stroke-width="3"/><path d="M552.0,974 L568.0,974 L560.0,986 z" fill="#38bdf8"/><rect x="60" y="992" width="1000" height="306" rx="14" fill="#10243b" stroke="#1e3a5f" stroke-width="1.5" filter="url(#sh)"/><path d="M60,1006 a14,14 0 0 1 14,-14 h972 a14,14 0 0 1 14,14 v38 h-1000 z" fill="url(#h4)"/><circle cx="90" cy="1018.0" r="17" fill="#ffffff" fill-opacity="0.22"/><text x="90" y="1025.0" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="118" y="1019.0" font-size="23" font-weight="800" fill="#fff">第四階段：右手 → 右頭 + 中頭</text><text x="1042" y="1019.0" font-size="15" fill="#e6f6ff" fill-opacity="0.92" text-anchor="end">目標：右手，續打右頭 + 中頭</text><text x="84" y="1078" font-size="17" font-weight="700" fill="#7dd3fc">›</text><text x="112" y="1078" font-size="17" fill="#dbeafe">集火右手（站位含右頭、中頭）</text><text x="84" y="1110" font-size="17" font-weight="700" fill="#fca5a5">！</text><text x="112" y="1110" font-size="17" fill="#dbeafe">右頭 &lt; 50% 狂暴 → 準備下煙（王右側平台 / 綠圈區）</text><text x="84" y="1142" font-size="17" font-weight="700" fill="#fde047">›</text><text x="112" y="1142" font-size="17" fill="#dbeafe">煙內集火輸出；標賊怕被電就直接往右跳閃，安全再回</text><text x="84" y="1174" font-size="17" font-weight="700" fill="#fde047">›</text><text x="112" y="1174" font-size="17" fill="#dbeafe">煙快散 → 陸續回原位</text><text x="84" y="1206" font-size="17" font-weight="700" fill="#86efac">◆</text><text x="112" y="1206" font-size="17" fill="#dbeafe">若仍狂暴 — 備案1：英雄 + 刀賊站原地繼續打</text><text x="84" y="1238" font-size="17" font-weight="700" fill="#86efac">◆</text><text x="112" y="1238" font-size="17" fill="#dbeafe">備案2（最安全）：右邊全退「最右綠框安全區」至狂暴結束</text><text x="84" y="1270" font-size="17" font-weight="700" fill="#7dd3fc">✓</text><text x="112" y="1270" font-size="17" fill="#dbeafe">狂暴電完右手通常掉 → 續打右頭 + 中頭</text><line x1="560.0" y1="1304" x2="560.0" y2="1328" stroke="#38bdf8" stroke-width="3"/><path d="M552.0,1326 L568.0,1326 L560.0,1338 z" fill="#38bdf8"/><rect x="60" y="1344" width="1000" height="114" rx="14" fill="#10243b" stroke="#1e3a5f" stroke-width="1.5" filter="url(#sh)"/><path d="M60,1358 a14,14 0 0 1 14,-14 h972 a14,14 0 0 1 14,14 v38 h-1000 z" fill="url(#h5)"/><circle cx="90" cy="1370.0" r="17" fill="#ffffff" fill-opacity="0.22"/><text x="90" y="1377.0" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="118" y="1371.0" font-size="23" font-weight="800" fill="#fff">最後階段：收尾雙腿</text><text x="1042" y="1371.0" font-size="15" fill="#e6f6ff" fill-opacity="0.92" text-anchor="end">目標：剩下的雙腿</text><text x="84" y="1430" font-size="17" font-weight="700" fill="#7dd3fc">›</text><text x="112" y="1430" font-size="17" fill="#dbeafe">英雄 → 右下處打　｜　拳霸 → 左上　｜　弓手 → 左下打左腿</text><rect x="60" y="1472" width="1000" height="96" rx="12" fill="#0c1d30" stroke="#334155" stroke-width="1.5"/><text x="82" y="1502" font-size="16" font-weight="800" fill="#7dd3fc">官方擊破順序（참고）</text><text x="82" y="1530" font-size="17" fill="#dbeafe">尾巴（無條件先）→ 左頭 → 中頭 → 右頭　｜　肚子（中央軀體）最後打</text><text x="82" y="1554" font-size="15" fill="#94a3b8">通用：左右手平常會放紅閃電，站位須避開範圍；撤離一律「越遠先走、肚子最晚」。</text></svg>