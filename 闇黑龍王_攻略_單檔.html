  markEls.forEach(m=>m.remove()); markEls=[];
  (st.marks||[]).forEach(m=>{ const d=document.createElement('div'); d.className='mark '+m.kind;
    d.style.left=m.x+'%'; d.style.top=m.y+'%'; d.style.width=(m.r*2)+'%';
    if(m.kind==='X') d.innerHTML=Xsvg; arena.appendChild(d); markEls.push(d); });
  zoneEls.forEach(z=>z.remove()); zoneEls=[];
  (st.zones||[]).concat(GLOBAL_ZONES).forEach(z=>{ const d=document.createElement('div'); d.className='zone '+z.kind;
    d.style.left=z.x+'%'; d.style.top=z.y+'%'; d.style.width=z.w+'%'; d.style.height=z.h+'%';
    d.innerHTML='<span>'+(z.t||'')+'</span>'; arena.appendChild(d); zoneEls.push(d); });
  document.getElementById('ptitle').innerHTML = st.name + '<span class="tag" style="background:'+st.color+'33;color:'+st.color+'">'+i+' / '+(STAGES.length-1)+'</span>';
  const ul=document.getElementById('plist'); ul.innerHTML='';
  st.notes.forEach(n=>{ const li=document.createElement('li'); if(n[0])li.className=n[0]; li.textContent=n[1]; ul.appendChild(li); });
  [...stepsEl.children].forEach((d,j)=>d.classList.toggle('on',j===i));
}
function go(i){ cur=(i+STAGES.length)%STAGES.length; render(cur); }
document.getElementById('next').onclick=()=>go(cur+1);
document.getElementById('prev').onclick=()=>go(cur-1);
const playBtn=document.getElementById('play');
playBtn.onclick=()=>{ playing=!playing; playBtn.textContent=playing?'⏸ 暫停':'▶ 自動播放';
  if(playing){ timer=setInterval(()=>{ if(cur===STAGES.length-1){playing=false;playBtn.textContent='▶ 自動播放';clearInterval(timer);return;} go(cur+1); },2400);} else clearInterval(timer); };
go(0);
</script>
